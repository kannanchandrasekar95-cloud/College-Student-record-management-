{% extends "base.html" %}

{% block title %}Edit Student - Student Record Management{% endblock %}

{% block content %}
<div class="form-page">
    <h1 class="page-title">✏️ Edit Student</h1>

    <form action="{{ url_for('edit_student', id=id) }}" method="POST" class="student-form" onsubmit="return validateForm();">
        <div class="form-group">
            <label for="student_id">Student ID *</label>
            <input type="text" id="student_id" name="student_id" value="{{ student['student_id'] }}" required>
        </div>

        <div class="form-group">
            <label for="full_name">Full Name *</label>
            <input type="text" id="full_name" name="full_name" value="{{ student['full_name'] }}" required>
        </div>

        <div class="form-group">
            <label for="department">Department *</label>
            <input type="text" id="department" name="department" value="{{ student['department'] }}" required>
        </div>

        <div class="form-group">
            <label for="year">Year *</label>
            <select id="year" name="year" required>
                <option value="1st Year" {% if student['year'] == '1st Year' %}selected{% endif %}>1st Year</option>
                <option value="2nd Year" {% if student['year'] == '2nd Year' %}selected{% endif %}>2nd Year</option>
                <option value="3rd Year" {% if student['year'] == '3rd Year' %}selected{% endif %}>3rd Year</option>
                <option value="4th Year" {% if student['year'] == '4th Year' %}selected{% endif %}>4th Year</option>
            </select>
        </div>

        <div class="form-group">
            <label for="email">Email *</label>
            <input type="email" id="email" name="email" value="{{ student['email'] }}" required>
        </div>

        <div class="form-group">
            <label for="phone">Phone Number *</label>
            <input type="text" id="phone" name="phone" value="{{ student['phone'] }}" required>
        </div>

        <div class="form-actions">
            <button type="submit" class="btn btn-primary">Update Student</button>
            <a href="{{ url_for('students') }}" class="btn btn-secondary">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
